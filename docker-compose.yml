services:
  app:
    build: .
    image: splat-gallery
    ports:
      - "8080:80"
    environment:
      # WAJIB disesuaikan saat deploy: URL publik situs
      APP_URL: http://localhost:8080
      APP_ENV: production
      APP_DEBUG: "false"
      # Opsional: isi APP_KEY sendiri (php artisan key:generate --show).
      # Bila kosong, key dibuat otomatis dan disimpan di volume storage.
      APP_KEY: ""
      # Seed scene demo + user demo saat pertama kali jalan
      SEED_DEMO: "true"
      # Fitur konversi lokal (Node + splat-transform sudah ada di image)
      FEATURE_LOCAL_CONVERT: "true"
      CONVERT_MAX_MB: 200
      UPLOAD_MAX_MB: 500
      # --- pakai MySQL? aktifkan service db di bawah lalu isi ini ---
      # DB_CONNECTION: mysql
      # DB_HOST: db
      # DB_PORT: 3306
      # DB_DATABASE: splat_gallery
      # DB_USERNAME: splat
      # DB_PASSWORD: rahasia-ganti-ini
    volumes:
      # menyimpan database SQLite, file splat yang diunggah, thumbnail,
      # APP_KEY otomatis, log — aman saat container dibuat ulang
      - splat-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # --- opsional: MySQL (default memakai SQLite, tidak perlu service ini) ---
  # db:
  #   image: mysql:8.4
  #   environment:
  #     MYSQL_DATABASE: splat_gallery
  #     MYSQL_USER: splat
  #     MYSQL_PASSWORD: rahasia-ganti-ini
  #     MYSQL_RANDOM_ROOT_PASSWORD: "yes"
  #   volumes:
  #     - splat-mysql:/var/lib/mysql
  #   restart: unless-stopped

volumes:
  splat-storage:
  # splat-mysql:
