<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Splat Gallery</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">
            <span class="brand-logo" aria-hidden="true"></span>
            <span id="site-title">Splat <span class="accent">Gallery</span></span>
        </a>
        <span class="spacer"></span>
        <button class="icon-btn" data-menu-open aria-label="Buka menu">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <rect x="3" y="4" width="18" height="16" rx="2"/><line x1="14" y1="4" x2="14" y2="20"/>
            </svg>
        </button>
    </header>

    <div class="toolbar">
        <input type="search" id="search" placeholder="Cari…" autocomplete="off">
        <select id="sort" aria-label="Urutkan">
            <option value="default">Default</option>
            <option value="newest">Terbaru</option>
            <option value="title">Judul A–Z</option>
        </select>
    </div>

    <main class="gallery" id="gallery">
        <div class="status">Memuat galeri…</div>
    </main>

    <footer class="site-footer">
        Dibuat dengan <a href="https://superspl.at/editor" target="_blank" rel="noopener">SuperSplat</a>
        &middot; ditenagai <a href="https://playcanvas.com" target="_blank" rel="noopener">PlayCanvas</a>
    </footer>

    <script type="module" src="js/gallery.js"></script>
    <script type="module" src="js/menu.js"></script>
</body>
</html>
